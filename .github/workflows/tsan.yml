name: ThreadSanitizer

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tsan:
    name: TSan coverage
    runs-on: ubuntu-latest
    env:
      CC: gcc
      CXX: g++
      TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC C++ toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++

      - name: Verify C++23 standard library
        run: |
          "$CXX" --version
          "$CXX" -std=c++23 -x c++ -o /tmp/vio_expected_probe - <<'CPP'
          #include <expected>
          #include <string>

          int main() {
              std::expected<int, std::string> value = 7;
              if (!value || *value != 7) {
                  return 1;
              }

              std::expected<int, std::string> error = std::unexpected(std::string("error"));
              return error ? 1 : 0;
          }
          CPP
          /tmp/vio_expected_probe

      - name: Install latest xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Register VXrepo
        run: |
          xrepo add-repo vxrepo https://github.com/OneVoris/VXrepo.git
          xrepo update-repo

      - name: Record resolved VMem package
        run: xrepo info voris-vmem

      - name: Configure TSan build
        run: python .github/scripts/run_xmake_step.py -- xmake f -vD -y -m debug --build_tests=y --sanitize_thread=y --cc="$CC" --cxx="$CXX"

      - name: Build TSan tests
        run: python .github/scripts/run_xmake_step.py -- xmake -vD -j1

      - name: Run tasks TSan targets
        run: |
          python .github/scripts/run_xmake_step.py -- xmake run vio_task_test
          python .github/scripts/run_xmake_step.py -- xmake run vio_task_lifetime_test
          python .github/scripts/run_xmake_step.py -- xmake run vio_when_all_test
          python .github/scripts/run_xmake_step.py -- xmake run vio_when_any_test

      - name: Run scopes TSan targets
        run: python .github/scripts/run_xmake_step.py -- xmake run vio_async_scope_test

      - name: Run channels TSan targets
        run: python .github/scripts/run_xmake_step.py -- xmake run vio_channel_test

      - name: Run mailboxes TSan targets
        run: |
          python .github/scripts/run_xmake_step.py -- xmake run vio_mailbox_test
          python .github/scripts/run_xmake_step.py -- xmake run vio_shard_runtime_integration_test

      - name: Run backends TSan targets
        run: |
          python .github/scripts/run_xmake_step.py -- xmake run vio_backend_contract_test
          python .github/scripts/run_xmake_step.py -- xmake run vio_backend_differential_test
          python .github/scripts/run_xmake_step.py -- xmake run vio_epoll_backend_test
          python .github/scripts/run_xmake_step.py -- xmake run vio_io_uring_backend_test
          python .github/scripts/run_xmake_step.py -- xmake run vio_kqueue_backend_test
          python .github/scripts/run_xmake_step.py -- xmake run vio_iocp_backend_test
